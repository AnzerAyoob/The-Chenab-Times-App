name: Build APK

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      distribution: zulu
      java-version: 17

  - uses: subosito/flutter-action@v2
    with:
      flutter-version: 3.41.6

  - name: Decode keystore
    run: |
      echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > chenab-times.keystore

  - name: Print SHA256
    run: |
      keytool -list -v \
      -keystore chenab-times.keystore \
      -alias "${{ secrets.KEY_ALIAS }}" \
      -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
      -keypass "${{ secrets.KEY_PASSWORD }}" \
      | grep SHA256
